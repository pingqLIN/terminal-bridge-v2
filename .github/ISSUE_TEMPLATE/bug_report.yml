name: Bug report
description: Report a reproducible TB2 bug or regression
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for someone else to reproduce it.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: What broke?
      placeholder: bridge_start fails when...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, backend, CLI client, and install method
      placeholder: |
        Windows 11
        Python 3.11
        backend=process
        profile=codex
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: tb2 doctor output
      render: shell
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Start ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
