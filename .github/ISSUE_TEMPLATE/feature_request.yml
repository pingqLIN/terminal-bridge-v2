name: Feature request
description: Propose a focused enhancement for TB2
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow is blocked or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - MCP server
        - GUI
        - Room and bridge orchestration
        - Docs
        - Tests and tooling
        - Other
